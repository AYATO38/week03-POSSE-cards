<!DOCTYPE html>
<html lang="ja">
<head>
  <script src="https://cdn.tailwindcss.com"></script>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
</head>
<body class="bg-slate-900 flex flex-col justify-center items-center min-h-screen px-6 py-12">

  <h1 class="text-white text-3xl font-bold mb-10 tracking-widest">OUR FEATURES</h1>

  <div class="w-full max-w-5xl">
    
    <!-- 💡 解答①: 全体をスマホ時は縦並び、PC時(md)は横並び、要素間に余白を設定 -->
    <div class="flex flex-col md:flex-row gap-6">
      
      <!-- 💡 解答③: カード内を縦方向のFlexboxにし、一番下の要素(mt-auto)を最下部に押しやれるようにする -->
      <div class="bg-slate-800 border border-slate-700 p-8 rounded-2xl shadow-xl flex-1 hover:-translate-y-1 transition-transform flex flex-col">
        
        <!-- 💡 解答②: アイコンとタイトルを横並びにし、縦方向の中央揃えと余白を設定 -->
        <div class="flex items-center gap-">
          <div class="text-4xl">🚀</div>
          <h3 class="text-white text-xl font-bold">Modern Dev</h3>
        </div>
        
        <p class="text-slate-400 text-sm leading-relaxed mb-8">最新の技術スタックを用いて、現場レベルのモダンな開発手法を学びます。実践的なスキルを身につけましょう。</p>
        
        <a href="#" class="text-sky-400 text-sm font-bold hover:text-sky-300 transition-colors mt-auto flex items-center gap-1 w-fit">
          詳細を見る <span>→</span>
        </a>
      </div>

      <div class="bg-slate-800 border border-slate-700 p-8 rounded-2xl shadow-xl flex-1 hover:-translate-y-1 transition-transform flex flex-col">
        
        <div class="flex items-center gap-3 mb-6">
          <div class="text-4xl">🤖</div>
          <h3 class="text-white text-xl font-bold">AI Copilot</h3>
        </div>
        
        <p class="text-slate-400 text-sm leading-relaxed mb-8">AIを相棒として使いこなし、圧倒的なスピードでプロダクトを構築します。</p>
        
        <a href="#" class="text-sky-400 text-sm font-bold hover:text-sky-300 transition-colors mt-auto flex items-center gap-1 w-fit">
          詳細を見る <span>→</span>
        </a>
      </div>

      <div class="bg-slate-800 border border-slate-700 p-8 rounded-2xl shadow-xl flex-1 hover:-translate-y-1 transition-transform flex flex-col">
        
        <div class="flex items-center gap-3 mb-6">
          <div class="text-4xl">💻</div>
          <h3 class="text-white text-xl font-bold">Hackathon</h3>
        </div>
        
        <p class="text-slate-400 text-sm leading-relaxed mb-8">仲間とチームを組み、ゼロからサービスを創り上げる経験を積みます。アイディアを形にする楽しさを実感できる環境がここにあります。</p>
        
        <a href="#" class="text-sky-400 text-sm font-bold hover:text-sky-300 transition-colors mt-auto flex items-center gap-1 w-fit">
          詳細を見る <span>→</span>
        </a>
      </div>

    </div>

  </div>

</body>
</html>
