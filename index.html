<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>自己紹介カード</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
<header class="fixed top-0 left-0 w-full bg-white border-b z-50 flex items-center justify-between px-6 py-5">
    <h1 class="text-xl font-bold text-yellow-200 text-center" style="-webkit-text-stroke: 3px #000000; paint-order: stroke fill;">バンドメンバー紹介</h1>
    <nav>
        <ul class="flex space-x-4">
        <li><a href="#" class="text-gray-600 hover:text-yellow-200">ホーム</a></li>
        <li><a href="#" class="text-gray-600 hover:text-yellow-200">メンバー</a></li>
        <li><a href="#" class="text-gray-600 hover:text-yellow-200">ライブ情報</a></li>
        </ul>
    </nav>
</header>
  <body class="bg-gray-50 py-8">
    <main class="max-w-4xl mx-auto px-4">
      <h1 class="text-2xl font-bold text-gray-900 mb-6 text-center">バンドメンバー</h1>

      <!-- カードを横3枚並びにする。スマホでは縦1列 -->
      <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mx-auto">

        <div class="bg-white rounded-lg shadow p-6 flex flex-col items-center hover:-translate-y-1 transition-transform">
          <span class="text-4xl">🎷</span>
          <h2 class="text-lg font-bold text-gray-900 mt-3">okada
          </h2>
          <p class="text-gray-600 text-sm mt-2 text-center">サックスを担当。ピーマンが好き。</p>
        </div>

        <div class="bg-white rounded-lg shadow p-6 flex flex-col items-center hover:-translate-y-1 transition-transform">
          <span class="text-4xl">🎹</span>
          <h2 class="text-lg font-bold text-gray-900 mt-3">TAKU</h2>
          <p class="text-gray-600 text-sm mt-2 text-center">キーボードを担当。ハンバーガーが好き。</p>
        </div>

        <div class="bg-white rounded-lg shadow p-6 flex flex-col items-center hover:-translate-y-1 transition-transform">
          <span class="text-4xl">🥁</span>
          <h2 class="text-lg font-bold text-gray-900 mt-3">OTO</h2>
          <p class="text-gray-600 text-sm mt-2 text-center">ドラムを担当。さつまいもが好き。</p>
        </div>
      <div class="bg-white rounded-lg shadow p-6 flex flex-col items-center hover:-translate-y-1 transition-transform">
          <span class="text-4xl">🎸</span>
          <h2 class="text-lg font-bold text-gray-900 mt-3">山岡 健太</h2>
          <p class="text-gray-600 text-sm mt-2 text-center">ギターを担当。じゃがいもが好き。</p>
        </div>

        <div class="bg-white rounded-lg shadow p-6 flex flex-col items-center hover:-translate-y-1 transition-transform">
          <span class="text-4xl">💻</span>
          <h2 class="text-lg font-bold text-gray-900 mt-3">鈴木 裕</h2>
          <p class="text-gray-600 text-sm mt-2 text-center">コンポーザーを担当。ポテトが好き。</p>
        </div>

        <div class="bg-white rounded-lg shadow p-6 flex flex-col items-center hover:-translate-y-1 transition-transform">
          <span class="text-4xl">🎤</span>
          <h2 class="text-lg font-bold text-gray-900 mt-3">山本 唯</h2>
          <p class="text-gray-600 text-sm mt-2 text-center">ボーカルを担当。餅が好き。</p>
        </div>
      </div>
    </main>
  </body>
</html>
